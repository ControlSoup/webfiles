<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Plotter</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 10px 20px 20px;
            background: #1e1e1e;
            color: #fafafa;
            display: flex;
            flex-direction: column;
        }
        h1 { color: #fafafa; text-align: center; margin: 0 0 15px 0; font-size: clamp(1.2rem, 2vw, 1.5rem); }

        .config-panel {
            background: #2a2a2a;
            border-radius: 8px;
            padding: clamp(10px, 2vw, 20px);
            margin-bottom: 15px;
            width: 100%;
            flex-shrink: 0;
        }

        .config-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .config-group {
            flex: 1;
            min-width: 250px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #fafafa;
            font-size: 0.9rem;
        }

        select, input[type="text"] {
            padding: 8px 10px;
            border: 1px solid #444;
            border-radius: 4px;
            background: #333;
            color: #fafafa;
            width: 100%;
            font-size: 0.9rem;
        }

        select[multiple] {
            min-height: clamp(100px, 15vh, 150px);
            overflow-y: auto;
        }

        select option {
            padding: 8px;
        }

        button {
            padding: 10px 20px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
        }

        button:hover { background: #0055aa; }

        .chart-controls {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #444;
        }

        .chart-controls > div {
            flex: 1;
            min-width: 150px;
        }

        #plotContainer {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 10px;
            flex: 1;
            min-height: 0;
            width: 100%;
            display: flex;
        }

        #plotDiv {
            width: 100%;
            height: 100%;
            min-height: clamp(400px, 60vh, 800px);
        }

        .table-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            margin: 5px 0;
            background: #444;
            border-radius: 4px;
        }

        .table-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .table-item label {
            flex: 1;
            margin: 0;
            cursor: pointer;
        }

        .x-axis-config {
            background: #333;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin: 10px 0;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .radio-group input[type="radio"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .warning {
            background: #5c4816;
            color: #fafafa;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>Data Plotter</h1>

    <div class="config-panel">
        <div class="config-row">
            <div class="config-group">
                <h3 style="margin-top: 0;">Select Tables</h3>
                <div id="tableList">
                    <div class="loading">Loading tables...</div>
                </div>
            </div>
        </div>

        <div id="selectedTablesConfig" style="display: none;">
            <div class="x-axis-config">
                <label>X-axis Mode</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="xMode" value="auto" checked onchange="onXModeChange()">
                        Auto-match by column name
                    </label>
                    <label>
                        <input type="radio" name="xMode" value="manual" onchange="onXModeChange()">
                        Manual X-axis selection per table
                    </label>
                </div>

                <div id="autoXConfig">
                    <label>Common X Column (must exist in all selected tables)</label>
                    <select id="globalXSelect" onchange="onGlobalXChange()">
                        <option value="">Select X column...</option>
                    </select>
                    <div id="missingXWarning" class="warning" style="display: none;"></div>
                    <div id="missingXOverrides"></div>
                </div>

                <div id="manualXConfig" style="display: none;">
                </div>
            </div>

            <div class="config-row">
                <div class="config-group">
                    <label>Y-axis Column(s) (hold Ctrl/Cmd for multiple)</label>
                    <select id="yColumnSelect" multiple size="6">
                    </select>
                </div>
            </div>

            <div class="chart-controls">
                <div>
                    <label>Chart Type</label>
                    <select id="chartType">
                        <option value="line">Line</option>
                        <option value="scatter">Scatter</option>
                        <option value="bar">Bar</option>
                    </select>
                </div>
                <div>
                    <label>Chart Title</label>
                    <input type="text" id="chartTitle" placeholder="">
                </div>
                <div>
                    <label>X-axis Title</label>
                    <input type="text" id="xAxisTitle" placeholder="">
                </div>
                <div>
                    <label>Y-axis Title</label>
                    <input type="text" id="yAxisTitle" placeholder="">
                </div>
                <button onclick="generateChart()">Generate Chart</button>
                <button onclick="exportHtml()">Export As Html</button>
            </div>
        </div>
    </div>

    <div id="plotContainer" style="display: none;">
        <div id="plotDiv"></div>
    </div>

    <script>
        const BASE_URL = window.location.origin;
        let allTables = [];
        let tableData = {};  // tableName -> {columns, data}
        let selectedTables = new Set();
        let allUniqueCols = new Set();
        let currentFigure = null;

        async function loadTables() {
            try {
                const response = await fetch(`${BASE_URL}/data/list_all`);
                const tables = await response.json();
                allTables = tables;
                renderTableList();
            } catch (err) {
                document.getElementById('tableList').innerHTML =
                    `<div class="loading" style="color: #cc4444;">Error loading tables: ${err.message}</div>`;
            }
        }

        function renderTableList() {
            if (allTables.length === 0) {
                document.getElementById('tableList').innerHTML =
                    '<div class="loading">No tables available. Upload CSV files in the Data Tables tab first.</div>';
                return;
            }

            let html = '';
            for (const table of allTables) {
                const checked = selectedTables.has(table) ? 'checked' : '';
                html += `
                    <div class="table-item">
                        <input type="checkbox" id="tbl_${table}" value="${table}" ${checked} onchange="onTableToggle('${table}')">
                        <label for="tbl_${table}">${table}</label>
                    </div>
                `;
            }
            document.getElementById('tableList').innerHTML = html;
        }

        async function onTableToggle(tableName) {
            const checkbox = document.getElementById(`tbl_${tableName}`);

            if (checkbox.checked) {
                selectedTables.add(tableName);

                // Load table data if not already loaded
                if (!tableData[tableName]) {
                    try {
                        const response = await fetch(`${BASE_URL}/data/query/${encodeURIComponent(tableName)}`);
                        const result = await response.json();
                        tableData[tableName] = result;

                        // Update unique columns
                        for (const col of result.columns) {
                            allUniqueCols.add(col);
                        }

                        // Auto-select first column as X default for manual mode
                        const firstCol = result.columns[0];
                        if (firstCol) {
                            tableData[tableName]._manualX = firstCol;
                        }

                        updateYColumnOptions();
                        updateGlobalXOptions();
                    } catch (err) {
                        console.error('Error loading table:', err);
                        selectedTables.delete(tableName);
                        checkbox.checked = false;
                        return;
                    }
                } else {
                    updateYColumnOptions();
                    updateGlobalXOptions();
                }
            } else {
                selectedTables.delete(tableName);
                updateYColumnOptions();
                updateGlobalXOptions();
            }

            // Show/hide config panel
            document.getElementById('selectedTablesConfig').style.display =
                selectedTables.size > 0 ? 'block' : 'none';

            // Update X-axis config based on mode
            const xMode = document.querySelector('input[name="xMode"]:checked').value;
            if (xMode === 'auto') {
                updateGlobalXOptions();
                onGlobalXChange();
            } else {
                renderManualXConfig();
            }
        }

        function updateGlobalXOptions() {
            const select = document.getElementById('globalXSelect');
            const current = select.value;

            select.innerHTML = '<option value="">Select X column...</option>';
            for (const col of sorted(allUniqueCols)) {
                select.innerHTML += `<option value="${col}">${col}</option>`;
            }

            // Restore selection if still valid
            if (current && allUniqueCols.has(current)) {
                select.value = current;
            } else if (select.options.length > 1) {
                select.selectedIndex = 1;
            }
        }

        function updateYColumnOptions() {
            const select = document.getElementById('yColumnSelect');
            const currentSelections = Array.from(select.selectedOptions).map(o => o.value);

            select.innerHTML = '';

            for (const tableName of selectedTables) {
                if (tableData[tableName]) {
                    for (const col of tableData[tableName].columns) {
                        const displayName = `${tableName}: ${col}`;
                        const exists = Array.from(select.options).some(o => o.value === displayName);
                        if (!exists) {
                            const selected = currentSelections.includes(displayName);
                            select.innerHTML += `<option value="${displayName}" ${selected ? 'selected' : ''}>${displayName}</option>`;
                        }
                    }
                }
            }

            // Auto-select first Y if none selected
            if (select.options.length > 0 && select.selectedOptions.length === 0) {
                select.options[0].selected = true;
            }
        }

        function onXModeChange() {
            const mode = document.querySelector('input[name="xMode"]:checked').value;
            document.getElementById('autoXConfig').style.display = mode === 'auto' ? 'block' : 'none';
            document.getElementById('manualXConfig').style.display = mode === 'manual' ? 'block' : 'none';

            if (mode === 'auto') {
                updateGlobalXOptions();
                onGlobalXChange();
            } else {
                renderManualXConfig();
            }
        }

        function onGlobalXChange() {
            const globalX = document.getElementById('globalXSelect').value;
            const warningDiv = document.getElementById('missingXWarning');
            const overridesDiv = document.getElementById('missingXOverrides');

            if (!globalX) {
                warningDiv.style.display = 'none';
                overridesDiv.innerHTML = '';
                return;
            }

            // Check which tables are missing this column
            const missingTables = [];
            for (const tableName of selectedTables) {
                if (tableData[tableName] && !tableData[tableName].columns.includes(globalX)) {
                    missingTables.push(tableName);
                }
            }

            if (missingTables.length > 0) {
                warningDiv.style.display = 'block';
                warningDiv.innerHTML = `Column '${globalX}' not found in: ${missingTables.join(', ')}. Please select X-axis columns for these tables:`;

                let html = '';
                for (const tableName of missingTables) {
                    const cols = tableData[tableName].columns;
                    html += `
                        <div style="margin: 10px 0;">
                            <label>X-axis for ${tableName}</label>
                            <select onchange="onOverrideXChange('${tableName}', this.value)" style="max-width: 300px;">
                                <option value="">Select X...</option>
                                ${cols.map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                        </div>
                    `;
                }
                overridesDiv.innerHTML = html;
            } else {
                warningDiv.style.display = 'none';
                overridesDiv.innerHTML = '';
            }
        }

        function onOverrideXChange(tableName, value) {
            // Store override for this table
            tableData[tableName]._xOverride = value;
        }

        function renderManualXConfig() {
            const div = document.getElementById('manualXConfig');
            let html = '';

            for (const tableName of selectedTables) {
                if (tableData[tableName]) {
                    const cols = tableData[tableName].columns;
                    let currentX = tableData[tableName]._manualX;
                    if (!currentX || !cols.includes(currentX)) {
                        currentX = cols[0];
                        tableData[tableName]._manualX = currentX;
                    }
                    html += `
                        <div style="margin: 10px 0;">
                            <label>X-axis for ${tableName}</label>
                            <select onchange="onManualXChange('${tableName}', this.value)" style="max-width: 300px;">
                                ${cols.map(c => `<option value="${c}" ${c === currentX ? 'selected' : ''}>${c}</option>`).join('')}
                            </select>
                        </div>
                    `;
                }
            }
            div.innerHTML = html;
        }

        function onManualXChange(tableName, value) {
            if (tableData[tableName]) {
                tableData[tableName]._manualX = value;
            }
        }

        function getXForTable(tableName) {
            const mode = document.querySelector('input[name="xMode"]:checked').value;
            const data = tableData[tableName];

            if (!data) return null;

            if (mode === 'auto') {
                const globalX = document.getElementById('globalXSelect').value;
                if (data._xOverride) return data._xOverride;
                if (globalX && data.columns.includes(globalX)) return globalX;
                // Fallback to first column
                return data.columns[0];
            } else {
                return data._manualX || data.columns[0];
            }
        }

        function generateChart() {
            const ySelect = document.getElementById('yColumnSelect');
            const chartType = document.getElementById('chartType').value;
            const chartTitle = document.getElementById('chartTitle').value;

            const ySelections = Array.from(ySelect.selectedOptions).map(o => o.value);
            if (ySelections.length === 0) {
                alert('Please select at least one Y-axis column');
                return;
            }

            // Parse Y selections: "tableName: columnName"
            const traces = [];
            for (const yDisp of ySelections) {
                const parts = yDisp.split(': ');
                const tableName = parts[0];
                const yCol = parts.slice(1).join(': ');  // Handle column names with colons

                const data = tableData[tableName];
                if (!data) continue;

                const xCol = getXForTable(tableName);
                if (!xCol) continue;

                const trace = {
                    x: data.data.map(row => row[xCol]),
                    y: data.data.map(row => row[yCol]),
                    name: yDisp,
                    type: chartType,
                    mode: chartType === 'line' ? 'lines' : chartType === 'scatter' ? 'markers' : undefined,
                    hovertemplate: `${xCol}: %{x}<br>${yCol}: %{y}<extra>${yDisp}</extra>`
                };
                traces.push(trace);
            }

            const xAxisTitle = document.getElementById('xAxisTitle').value;
            const yAxisTitle = document.getElementById('yAxisTitle').value;

            const layout = {
              title: chartTitle,
              hovermode: 'x unified',
              xaxis: { title: xAxisTitle || null, color: '#e6e6e6' },
              yaxis: { title: yAxisTitle || null, color: '#e6e6e6' },
              template: 'plotly_dark',
              paper_bgcolor: '#1e1e1e',
              plot_bgcolor: '#2F2F2FFF',
              font: { color: '#e6e6e6' },
              legend: { orientation: 'v', xanchor: 'left', x: 1.02, yanchor: 'top', y: 1 },
              margin: { t: 60, b: 60, l: 60, r: 180 }
            };

            const config = {
                responsive: true,
                displayModeBar: true,
                modeBarButtonsToRemove: ['lasso2d', 'select2d']
            };

            // ensure container background doesn't override plot
            document.getElementById('plotContainer').style.background = 'transparent';
            document.getElementById('plotDiv').style.background = 'transparent';
            document.getElementById('plotContainer').style.display = 'block';

            currentFigure = {
                data: traces,
                layout: layout
            };
            Plotly.newPlot('plotDiv', traces, layout, config);
        }

        function sorted(set) {
            return Array.from(set).sort();
        }

    function exportHtml() {
            if (!currentFigure) {
                alert("No chart to export.");
                return;
            }

             // Convert to safe JSON for embedding
            const safeJson = obj => JSON.stringify(obj).replace(/<\/script>/g, '<\\/script>');

            let html = document.getElementById('exportTemplate').innerHTML;
            html = html
                .replace('__DATA__', safeJson(currentFigure.data))
                .replace('__LAYOUT__', safeJson(currentFigure.layout))
                .replace('__BODY_BG__', currentFigure.layout.paper_bgcolor || '#ffffff');  // fallback white
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = 'chart.html';
            a.click();

            URL.revokeObjectURL(url);
        }

        // Initialize
        loadTables();
    </script>
</body>
</html>
<template id="exportTemplate">
    <!DOCTYPE html>
    <html>
        <style>
            html, body {
                margin: 0;
                padding: 0;
                background: __BODY_BG__;
            }
        </style>
        <head>
            <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
        </head>
            <body style="margin:0; background: __BODY_BG__;">
                <div id="plot"></div>
                <script>
                    const data = __DATA__;
                    const layout = __LAYOUT__;
                    Plotly.newPlot('plot', data, layout);
                </script>
            </body>
    </html>
</template>
