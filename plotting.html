<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Plotter</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 10px 20px 20px;
            background: #1e1e1e;
            color: #fafafa;
            display: flex;
            flex-direction: column;
        }
        h1 { color: #fafafa; text-align: center; margin: 0 0 15px 0; font-size: clamp(1.2rem, 2vw, 1.5rem); }

        .config-panel {
            background: #2a2a2a;
            border-radius: 8px;
            padding: clamp(10px, 2vw, 20px);
            margin-bottom: 15px;
            width: 100%;
            flex-shrink: 0;
        }

        .config-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .config-group {
            flex: 1;
            min-width: 250px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #fafafa;
            font-size: 0.9rem;
        }

        select, input[type="text"] {
            padding: 8px 10px;
            border: 1px solid #444;
            border-radius: 4px;
            background: #333;
            color: #fafafa;
            width: 100%;
            font-size: 0.9rem;
        }

        button {
            padding: 10px 20px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
        }

        button:hover { background: #0055aa; }

        .chart-controls {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #444;
        }

        .chart-controls > div {
            flex: 1;
            min-width: 150px;
        }

        #plotContainer {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 10px;
            flex: 1;
            min-height: 0;
            width: 100%;
            display: flex;
        }

        #plotDiv {
            width: 100%;
            height: 100%;
            min-height: clamp(400px, 60vh, 800px);
        }

        .x-axis-config {
            background: #333;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin: 10px 0;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .radio-group input[type="radio"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .warning {
            background: #5c4816;
            color: #fafafa;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        /* Searchable select styles */
        .searchable-select {
            position: relative;
            width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #444;
            border-radius: 4px;
            background: #333;
            color: #fafafa;
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        .search-input:focus {
            outline: none;
            border-color: #0066cc;
        }

        .search-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 200px;
            overflow-y: auto;
            background: #333;
            border: 1px solid #444;
            border-radius: 4px;
            margin-top: 4px;
            z-index: 1000;
            display: none;
        }

        .search-dropdown.show {
            display: block;
        }

        .search-option {
            padding: 8px 10px;
            cursor: pointer;
            border-bottom: 1px solid #444;
        }

        .search-option:hover {
            background: #444;
        }

        .search-option.selected {
            background: #0066cc;
        }

        .search-option:last-child {
            border-bottom: none;
        }

        .selected-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
            min-height: 24px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            background: #0066cc;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .tag-remove {
            cursor: pointer;
            font-weight: bold;
            padding: 0 4px;
        }

        .tag-remove:hover {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <h1>Data Plotter</h1>

    <div class="config-panel">
        <div class="config-row">
            <div class="config-group">
                <h3 style="margin-top: 0;">Select Tables</h3>
                <div class="searchable-select">
                    <input type="text" class="search-input" id="tableSearch" placeholder="Search tables...">
                    <div class="search-dropdown" id="tableDropdown"></div>
                </div>
                <div class="selected-tags" id="selectedTableTags"></div>
            </div>
        </div>

        <div id="selectedTablesConfig" style="display: none;">
            <div class="x-axis-config">
                <label>X-axis Mode</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="xMode" value="auto" checked onchange="onXModeChange()">
                        Auto-match by column name
                    </label>
                    <label>
                        <input type="radio" name="xMode" value="manual" onchange="onXModeChange()">
                        Manual X-axis selection per table
                    </label>
                </div>

                <div id="autoXConfig">
                    <label>Common X Column (must exist in all selected tables)</label>
                    <div class="searchable-select" style="max-width: 300px;">
                        <input type="text" class="search-input" id="globalXSearch" placeholder="Search columns...">
                        <div class="search-dropdown" id="globalXDropdown"></div>
                    </div>
                    <div class="selected-tags" id="globalXTags"></div>
                    <div id="missingXWarning" class="warning" style="display: none;"></div>
                    <div id="missingXOverrides"></div>
                </div>

                <div id="manualXConfig" style="display: none;"></div>
            </div>

            <div class="config-row">
                <div class="config-group">
                    <label>Y-axis Column(s)</label>
                    <div class="searchable-select">
                        <input type="text" class="search-input" id="ySearch" placeholder="Search columns...">
                        <div class="search-dropdown" id="yDropdown"></div>
                    </div>
                    <div class="selected-tags" id="selectedYTags"></div>
                    <button onclick="showYWarnings()" style="margin-top: 8px; padding: 6px 12px; font-size: 0.85rem;">Show Warnings</button>
                    <div id="yAxisWarnings"></div>
                </div>
            </div>

            <div class="chart-controls">
                <div>
                    <label>Chart Type</label>
                    <select id="chartType">
                        <option value="line">Line</option>
                        <option value="scatter">Scatter</option>
                        <option value="bar">Bar</option>
                    </select>
                </div>
                <div>
                    <label>Chart Title</label>
                    <input type="text" id="chartTitle" placeholder="">
                </div>
                <div>
                    <label>X-axis Title</label>
                    <input type="text" id="xAxisTitle" placeholder="">
                </div>
                <div>
                    <label>Y-axis Title</label>
                    <input type="text" id="yAxisTitle" placeholder="">
                </div>
                <button onclick="generateChart()">Generate Chart</button>
                <button onclick="exportHtml()">Export As Html</button>
            </div>
        </div>
    </div>

    <div id="plotContainer" style="display: none;">
        <div id="plotDiv"></div>
    </div>

    <script>
        const BASE_URL = window.location.origin;
        let allTables = [];
        let tableData = {};
        let selectedTables = new Set();
        let allUniqueCols = new Set();
        let currentFigure = null;
        let selectedYColumns = new Set();

        // ===== Generic SearchableSelect Factory =====
        const searchableSelects = new Map();

        class SearchableSelect {
            constructor(config) {
                this.id = config.id;
                this.searchEl = document.getElementById(config.searchId);
                this.dropdownEl = document.getElementById(config.dropdownId);
                this.tagsEl = document.getElementById(config.tagsId);
                this.getOptions = config.getOptions;
                this.getSelected = config.getSelected;
                this.setSelected = config.setSelected;
                this.getValue = config.getValue;
                this.setValue = config.setValue;
                this.onChange = config.onChange || (() => {});
                this.xProperty = config.xProperty;
                this.xTableName = config.xTableName;

                searchableSelects.set(this.id, this);

                this.searchEl.addEventListener('input', () => this.renderDropdown());
                this.searchEl.addEventListener('focus', () => this.showDropdown());
            }

            getSelectedValue() {
                if (this.xProperty && this.xTableName) {
                    return tableData[this.xTableName]?.[this.xProperty] || null;
                }
                return this.getValue ? this.getValue() : null;
            }

            setSelectedValue(val) {
                if (this.xProperty && this.xTableName && tableData[this.xTableName]) {
                    tableData[this.xTableName][this.xProperty] = val;
                } else if (this.setValue) {
                    this.setValue(val);
                }
            }

            renderTags() {
                if (!this.tagsEl) return;
                const selected = this.getSelected ? this.getSelected() : null;

                if (selected instanceof Set) {
                    // Multi-select
                    this.tagsEl.innerHTML = '';

                    // Y-axis: group by column name, show warnings for missing tables
                    if (this.id === 'ySelect') {
                        const colNames = new Set();
                        for (const item of selected) {
                            const parts = item.split(': ');
                            colNames.add(parts.slice(1).join(': '));
                        }
                        for (const colName of colNames) {
                            const missing = getMissingTablesForColumn(colName);
                            const tag = document.createElement('span');
                            tag.className = 'tag';
                            tag.innerHTML = `${colName}<span class="tag-remove">&times;</span>`;
                            tag.querySelector('.tag-remove').onclick = (e) => {
                                e.stopPropagation();
                                // Remove all entries for this column
                                for (const tbl of selectedTables) {
                                    selected.delete(`${tbl}: ${colName}`);
                                }
                                this.setSelected(selected);
                                this.renderTags();
                                this.renderDropdown();
                                this.onChange();
                            };
                            this.tagsEl.appendChild(tag);

                            if (missing.length > 0) {
                                const warn = document.createElement('div');
                                warn.className = 'warning';
                                warn.style.fontSize = '0.8rem';
                                warn.style.padding = '4px 8px';
                                warn.style.margin = '4px 0';
                                warn.innerHTML = `${colName} not in: ${missing.join(', ')}`;
                                this.tagsEl.appendChild(warn);
                            }
                        }
                    } else {
                        // Tables multi-select
                        for (const item of selected) {
                            const tag = document.createElement('span');
                            tag.className = 'tag';
                            tag.innerHTML = `${item}<span class="tag-remove">&times;</span>`;
                            tag.querySelector('.tag-remove').onclick = (e) => {
                                e.stopPropagation();
                                selected.delete(item);
                                this.setSelected(selected);
                                this.renderTags();
                                this.renderDropdown();
                                this.onChange();
                            };
                            this.tagsEl.appendChild(tag);
                        }
                    }
                } else if (selected) {
                    // Single-select with getSelected
                    this.tagsEl.innerHTML = '';
                    const tag = document.createElement('span');
                    tag.className = 'tag';
                    tag.innerHTML = `${selected}<span class="tag-remove">&times;</span>`;
                    tag.querySelector('.tag-remove').onclick = (e) => {
                        e.stopPropagation();
                        this.setSelectedValue(null);
                        this.renderTags();
                        this.renderDropdown();
                        this.onChange();
                    };
                    this.tagsEl.appendChild(tag);
                } else if (this.getValue) {
                    // Single-select with getValue (X-axis)
                    const value = this.getSelectedValue();
                    if (value) {
                        this.tagsEl.innerHTML = '';
                        const tag = document.createElement('span');
                        tag.className = 'tag';
                        tag.innerHTML = `${value}<span class="tag-remove">&times;</span>`;
                        tag.querySelector('.tag-remove').onclick = (e) => {
                            e.stopPropagation();
                            this.setSelectedValue(null);
                            this.renderTags();
                            this.renderDropdown();
                            this.onChange();
                        };
                        this.tagsEl.appendChild(tag);
                    } else {
                        this.tagsEl.innerHTML = '';
                    }
                } else {
                    this.tagsEl.innerHTML = '';
                }
            }

            renderDropdown() {
                if (!this.dropdownEl) return;
                const search = this.searchEl.value.toLowerCase();
                const options = this.getOptions();
                const selected = this.getSelected ? this.getSelected() : null;
                const currentValue = this.getSelectedValue();
                const self = this;

                const matches = options.filter(opt => opt.toLowerCase().includes(search));
                this.dropdownEl.innerHTML = matches.length ? matches.map(opt => {
                    const isSelected = selected instanceof Set ? selected.has(opt) : opt === currentValue;
                    return `<div class="search-option ${isSelected ? 'selected' : ''}" data-value="${opt}">${opt}</div>`;
                }).join('') : '<div class="search-option">No matches</div>';

                // Add click handlers
                this.dropdownEl.querySelectorAll('.search-option').forEach(el => {
                    el.onclick = (e) => {
                        e.stopPropagation();
                        self.toggle(el.dataset.value);
                    };
                });
            }

            showDropdown() {
                this.dropdownEl.classList.add('show');
                this.renderDropdown();
            }

            hideDropdown() {
                this.dropdownEl.classList.remove('show');
                this.searchEl.value = '';
                this.renderDropdown();
            }

            toggle(value) {
                const selected = this.getSelected ? this.getSelected() : null;

                if (selected instanceof Set) {
                    // Multi-select
                    if (selected.has(value)) {
                        selected.delete(value);
                    } else {
                        selected.add(value);
                        // Y-axis: expand to all tables
                        if (this.id === 'ySelect') {
                            expandYSelection(value);
                        }
                    }
                    this.setSelected(selected);
                } else {
                    // Single-select
                    const current = this.getSelectedValue();
                    this.setSelectedValue(current === value ? null : value);
                }
                this.renderTags();
                this.renderDropdown();
                this.hideDropdown();
                this.onChange();
            }
        }

        // ===== Configurations for each select =====
        let tableSelect, ySelect;

        async function initTableSelect() {
            tableSelect = new SearchableSelect({
                id: 'tableSelect',
                searchId: 'tableSearch',
                dropdownId: 'tableDropdown',
                tagsId: 'selectedTableTags',
                getOptions: () => Array.from(allTables),
                getSelected: () => selectedTables,
                setSelected: (val) => { selectedTables = val; },
                getValue: () => null,
                setValue: () => {},
                onChange: async () => {
                    for (const tbl of selectedTables) {
                        await loadTableData(tbl);
                    }
                    updateYColumnOptions();
                    updateGlobalXOptions();
                    updateConfigPanel();
                }
            });
        }

        function initYSelect() {
            ySelect = new SearchableSelect({
                id: 'ySelect',
                searchId: 'ySearch',
                dropdownId: 'yDropdown',
                tagsId: 'selectedYTags',
                getOptions: getUniqueColumnNames,
                getSelected: () => selectedYColumns,
                setSelected: (val) => { selectedYColumns = val; },
                getValue: () => null,
                setValue: () => {},
                onChange: updateYColumnOptions
            });
        }

        function getYColumnOptions() {
            const options = [];
            for (const tableName of selectedTables) {
                if (tableData[tableName]) {
                    for (const col of tableData[tableName].columns) {
                        options.push(`${tableName}: ${col}`);
                    }
                }
            }
            return options;
        }

        function getUniqueColumnNames() {
            const uniqueCols = new Set();
            for (const tableName of selectedTables) {
                if (tableData[tableName]) {
                    for (const col of tableData[tableName].columns) {
                        uniqueCols.add(col);
                    }
                }
            }
            return Array.from(uniqueCols).sort();
        }

        function expandYSelection(columnName) {
            for (const tableName of selectedTables) {
                if (tableData[tableName] && tableData[tableName].columns.includes(columnName)) {
                    selectedYColumns.add(`${tableName}: ${columnName}`);
                }
            }
        }

        function getMissingTablesForColumn(columnName) {
            const missing = [];
            for (const tableName of selectedTables) {
                if (tableData[tableName] && !tableData[tableName].columns.includes(columnName)) {
                    missing.push(tableName);
                }
            }
            return missing;
        }

        function showYWarnings() {
            const warningsDiv = document.getElementById('yAxisWarnings');
            const warnings = [];
            const colNames = new Set();
            for (const item of selectedYColumns) {
                const parts = item.split(': ');
                colNames.add(parts.slice(1).join(': '));
            }
            for (const colName of colNames) {
                const missing = getMissingTablesForColumn(colName);
                if (missing.length > 0) {
                    warnings.push(`${colName} not in: ${missing.join(', ')}`);
                }
            }
            if (warnings.length > 0) {
                warningsDiv.innerHTML = warnings.map(w => `<div class="warning" style="margin: 4px 0; padding: 8px;">${w}</div>`).join('');
            } else {
                warningsDiv.innerHTML = '<div style="color: #888; padding: 8px;">No warnings - all columns exist in all selected tables</div>';
            }
        }

        function createXSelect(tableName, property) {
            return new SearchableSelect({
                id: `xSelect_${tableName}`,
                searchId: `xSearch_${tableName}`,
                dropdownId: `xDropdown_${tableName}`,
                tagsId: `xTags_${tableName}`,
                xTableName: tableName,
                xProperty: property,
                getOptions: () => tableData[tableName]?.columns || [],
                getSelected: () => tableData[tableName]?.[property] || null,
                setSelected: (val) => { if (tableData[tableName]) tableData[tableName][property] = val; },
                onChange: () => {}
            });
        }

        function createOverrideXSelect(tableName) {
            return new SearchableSelect({
                id: `overrideXSelect_${tableName}`,
                searchId: `overrideXSearch_${tableName}`,
                dropdownId: `overrideXDropdown_${tableName}`,
                tagsId: `overrideXTags_${tableName}`,
                xTableName: tableName,
                xProperty: '_xOverride',
                getOptions: () => tableData[tableName]?.columns || [],
                getSelected: () => tableData[tableName]?._xOverride || null,
                setSelected: (val) => { if (tableData[tableName]) tableData[tableName]._xOverride = val; },
                onChange: () => {}
            });
        }

        async function loadTableData(tableName) {
            if (!tableData[tableName]) {
                try {
                    const response = await fetch(`${BASE_URL}/data/query/${encodeURIComponent(tableName)}`);
                    const result = await response.json();
                    tableData[tableName] = result;

                    for (const col of result.columns) {
                        allUniqueCols.add(col);
                    }

                    if (result.columns[0]) {
                        tableData[tableName]._manualX = result.columns[0];
                    }
                } catch (err) {
                    console.error('Error loading table:', err);
                    selectedTables.delete(tableName);
                    tableSelect.renderTags();
                    tableSelect.renderDropdown();
                }
            }
        }

        // ===== Global X-axis options =====
        let globalXSelect;

        function initGlobalXSelect() {
            globalXSelect = new SearchableSelect({
                id: 'globalXSelect',
                searchId: 'globalXSearch',
                dropdownId: 'globalXDropdown',
                tagsId: 'globalXTags',
                getOptions: () => sorted(allUniqueCols),
                getSelected: () => null,
                getValue: () => document.getElementById('globalXSelect')?.value || null,
                setValue: (val) => {
                    const select = document.getElementById('globalXSelect');
                    if (select) select.value = val;
                    onGlobalXChange();
                },
                onChange: () => { onGlobalXChange(); }
            });
        }

        function updateGlobalXOptions() {
            const select = document.getElementById('globalXSelect');
            const currentValue = select?.value;

            // Create hidden native select for value storage
            if (!select) {
                const hidden = document.createElement('select');
                hidden.id = 'globalXSelect';
                hidden.style.display = 'none';
                document.getElementById('autoXConfig').appendChild(hidden);
            }

            const newSelect = document.getElementById('globalXSelect');
            newSelect.innerHTML = '<option value="">Select X column...</option>';
            for (const col of sorted(allUniqueCols)) {
                newSelect.innerHTML += `<option value="${col}">${col}</option>`;
            }

            if (currentValue && allUniqueCols.has(currentValue)) {
                newSelect.value = currentValue;
            } else if (newSelect.options.length > 1) {
                newSelect.selectedIndex = 1;
            }

            if (globalXSelect) {
                globalXSelect.renderTags();
                globalXSelect.renderDropdown();
            }
        }

        function updateConfigPanel() {
            const configPanel = document.getElementById('selectedTablesConfig');
            configPanel.style.display = selectedTables.size > 0 ? 'block' : 'none';

            if (selectedTables.size > 0) {
                const xMode = document.querySelector('input[name="xMode"]:checked').value;
                if (xMode === 'auto') {
                    if (!globalXSelect) initGlobalXSelect();
                    updateGlobalXOptions();
                    onGlobalXChange();
                } else {
                    renderManualXConfig();
                }
            }
        }

        function updateYColumnOptions() {
            if (ySelect) {
                ySelect.renderTags();
                ySelect.renderDropdown();
            }
        }

        // ===== X-axis mode handlers =====
        function onXModeChange() {
            const mode = document.querySelector('input[name="xMode"]:checked').value;
            document.getElementById('autoXConfig').style.display = mode === 'auto' ? 'block' : 'none';
            document.getElementById('manualXConfig').style.display = mode === 'manual' ? 'block' : 'none';

            if (mode === 'auto') {
                if (!globalXSelect) initGlobalXSelect();
                updateGlobalXOptions();
            } else {
                renderManualXConfig();
            }
        }

        function onGlobalXChange() {
            const globalX = document.getElementById('globalXSelect').value;
            const warningDiv = document.getElementById('missingXWarning');
            const overridesDiv = document.getElementById('missingXOverrides');

            if (!globalX) {
                warningDiv.style.display = 'none';
                overridesDiv.innerHTML = '';
                return;
            }

            const missingTables = [];
            for (const tableName of selectedTables) {
                if (tableData[tableName] && !tableData[tableName].columns.includes(globalX)) {
                    missingTables.push(tableName);
                }
            }

            if (missingTables.length > 0) {
                warningDiv.style.display = 'block';
                warningDiv.innerHTML = `Column '${globalX}' not found in: ${missingTables.join(', ')}. Switch to "Manual X-axis selection per table" to select different X columns for each table.`;
                overridesDiv.innerHTML = '';
            } else {
                warningDiv.style.display = 'none';
                overridesDiv.innerHTML = '';
            }
        }

        function renderManualXConfig() {
            let html = '';
            for (const tableName of selectedTables) {
                if (tableData[tableName]) {
                    const cols = tableData[tableName].columns;
                    if (!tableData[tableName]._manualX || !cols.includes(tableData[tableName]._manualX)) {
                        tableData[tableName]._manualX = cols[0];
                    }
                    html += `
                        <div style="margin: 10px 0;">
                            <label>X-axis for ${tableName}</label>
                            <div class="searchable-select" style="max-width: 300px;">
                                <input type="text" class="search-input" id="xSearch_${tableName}" placeholder="Search columns...">
                                <div class="search-dropdown" id="xDropdown_${tableName}"></div>
                            </div>
                            <div class="selected-tags" id="xTags_${tableName}"></div>
                        </div>
                    `;
                }
            }
            document.getElementById('manualXConfig').innerHTML = html;

            for (const tableName of selectedTables) {
                if (tableData[tableName]) {
                    const select = createXSelect(tableName, '_manualX');
                    select.renderTags();
                    select.renderDropdown();
                }
            }
        }

        function getXForTable(tableName) {
            const mode = document.querySelector('input[name="xMode"]:checked').value;
            const data = tableData[tableName];

            if (!data) return null;

            if (mode === 'auto') {
                const globalX = document.getElementById('globalXSelect').value;
                if (data._xOverride) return data._xOverride;
                if (globalX && data.columns.includes(globalX)) return globalX;
                return data.columns[0];
            } else {
                return data._manualX || data.columns[0];
            }
        }

        // ===== Chart generation =====
        function generateChart() {
            const chartType = document.getElementById('chartType').value;
            const chartTitle = document.getElementById('chartTitle').value;

            if (selectedYColumns.size === 0) {
                alert('Please select at least one Y-axis column');
                return;
            }

            const traces = [];
            for (const yDisp of selectedYColumns) {
                const parts = yDisp.split(': ');
                const tableName = parts[0];
                const yCol = parts.slice(1).join(': ');

                const data = tableData[tableName];
                if (!data) continue;

                const xCol = getXForTable(tableName);
                if (!xCol) continue;

                traces.push({
                    x: data.data.map(row => row[xCol]),
                    y: data.data.map(row => row[yCol]),
                    name: yDisp,
                    type: chartType,
                    mode: chartType === 'line' ? 'lines' : chartType === 'scatter' ? 'markers' : undefined,
                    hovertemplate: `${xCol}: %{x}<br>${yCol}: %{y}<extra>${yDisp}</extra>`
                });
            }

            const xAxisTitle = document.getElementById('xAxisTitle').value;
            const yAxisTitle = document.getElementById('yAxisTitle').value;

            const layout = {
                title: chartTitle,
                hovermode: 'x unified',
                xaxis: { title: xAxisTitle || null, color: '#e6e6e6' },
                yaxis: { title: yAxisTitle || null, color: '#e6e6e6' },
                template: 'plotly_dark',
                paper_bgcolor: '#1e1e1e',
                plot_bgcolor: '#2F2F2FFF',
                font: { color: '#e6e6e6' },
                legend: { orientation: 'v', xanchor: 'left', x: 1.02, yanchor: 'top', y: 1 },
                margin: { t: 60, b: 60, l: 60, r: 180 }
            };

            document.getElementById('plotContainer').style.background = 'transparent';
            document.getElementById('plotDiv').style.background = 'transparent';
            document.getElementById('plotContainer').style.display = 'block';

            currentFigure = { data: traces, layout: layout };
            Plotly.newPlot('plotDiv', traces, layout, {
                responsive: true,
                displayModeBar: true,
                modeBarButtonsToRemove: ['lasso2d', 'select2d']
            });
        }

        function sorted(set) {
            return Array.from(set).sort();
        }

        function exportHtml() {
            if (!currentFigure) {
                alert("No chart to export.");
                return;
            }

            const safeJson = obj => JSON.stringify(obj).replace(/<\/script>/g, '<\\/script>');

            let html = document.getElementById('exportTemplate').innerHTML;
            html = html
                .replace('__DATA__', safeJson(currentFigure.data))
                .replace('__LAYOUT__', safeJson(currentFigure.layout))
                .replace('__BODY_BG__', currentFigure.layout.paper_bgcolor || '#ffffff');

            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'chart.html';
            a.click();
            URL.revokeObjectURL(url);
        }

        // Close dropdowns when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.searchable-select')) {
                document.querySelectorAll('.search-dropdown').forEach(d => d.classList.remove('show'));
            }
        });

        async function loadTables() {
            try {
                const response = await fetch(`${BASE_URL}/data/list_all`);
                const tables = await response.json();
                allTables = tables;
                initTableSelect();
                initYSelect();
                tableSelect.renderTags();
                tableSelect.renderDropdown();
            } catch (err) {
                document.getElementById('tableDropdown').innerHTML =
                    `<div class="search-option" style="color: #cc4444;">Error: ${err.message}</div>`;
            }
        }

        // Initialize
        loadTables();
    </script>
</body>
</html>
<template id="exportTemplate">
    <!DOCTYPE html>
    <html>
        <style>
            html, body {
                margin: 0;
                padding: 0;
                background: __BODY_BG__;
            }
        </style>
        <head>
            <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
        </head>
        <body style="margin:0; background: __BODY_BG__;">
            <div id="plot"></div>
            <script>
                const data = __DATA__;
                const layout = __LAYOUT__;
                Plotly.newPlot('plot', data, layout);
            </script>
        </body>
    </html>
</template>
